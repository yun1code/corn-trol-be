spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 50MB    # 파일 1개당 최대 크기
      max-request-size: 50MB # 1번 요청당 최대 크기

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET:corntrol-local-dev-secret-key-must-be-at-least-32-bytes-long}
  access-token-validity-in-ms: 1800000
  refresh-token-validity-in-ms: 604800000

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region:
      static: ap-northeast-2
    s3:
      bucket: ${AWS_S3_BUCKET}
    stack:
      auto: false

huggingface:
  api-key: ${HUGGINGFACE_API_KEY}
  url: https://router.huggingface.co/hf-inference/models/openai/whisper-large-v3-turbo