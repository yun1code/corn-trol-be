name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub에서 코드 가져오기
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Java 21 설치
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Gradle 빌드 권한 부여 및 빌드 (빌드 시 필요한 메일 환경변수 주입)
      - name: Build with Gradle
        working-directory: ./Corn-trol_Backend
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}

      # 4. 도커 허브 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. 도커 이미지 빌드 및 푸시
      - name: Build and push Docker image
        working-directory: ./Corn-trol_Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/corntrol:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/corntrol:latest

      # 6. EC2 접속 및 배포 (컨테이너 런타임 환경변수 추가)
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 기존 컨테이너 중지 및 삭제 (실패해도 계속 진행)
            sudo docker stop corntrol-container || true
            sudo docker rm corntrol-container || true
            
            # 안 쓰는 옛날 이미지 정리 (디스크 용량 확보)
            sudo docker image prune -f
            
            # 새 이미지 pull
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/corntrol:latest
            
            # 컨테이너 실행
            sudo docker run -d \
              --name corntrol-container \
              --network host \
              -e TZ="Asia/Seoul" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e AWS_ACCESS_KEY="${{ secrets.AWS_ACCESS_KEY }}" \
              -e AWS_SECRET_KEY="${{ secrets.AWS_SECRET_KEY }}" \
              -e AWS_S3_BUCKET="${{ secrets.AWS_S3_BUCKET }}" \
              -e HUGGINGFACE_API_KEY="${{ secrets.HUGGINGFACE_API_KEY }}" \
              -e MAIL_USERNAME="${{ secrets.MAIL_USERNAME }}" \
              -e MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}" \
              ${{ secrets.DOCKER_USERNAME }}/corntrol:latest