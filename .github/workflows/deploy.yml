name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # main 브랜치에 코드가 올라가면 실행

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub에서 코드 가져오기
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Java 21 설치
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Gradle 빌드 권한 부여 및 빌드 (테스트 제외)
      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      # 4. 도커 허브 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. 도커 이미지 빌드 및 푸시
      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/corntrol:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/corntrol:latest

      # 6. EC2 접속 및 배포
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 기존 컨테이너 중지 및 삭제 (있으면)
            sudo docker stop corntrol-container || true
            sudo docker rm corntrol-container || true
            
            # 새 이미지 pull
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/corntrol:latest
            
            # 컨테이너 실행 (비밀번호 안전하게 주입)
            sudo docker run -d \
              --name corntrol-container \
              -p 8080:8080 \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              ${{ secrets.DOCKER_USERNAME }}/corntrol:latest